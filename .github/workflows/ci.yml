name: CI

# CI only runs when something it actually verifies changes (allowlist).
# Docs / diagrams / fabric_items backups / notebook copies don't affect pytest+build.
on:
  push:
    branches: [main]
    paths:
      - "ssv_data/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "ssv_data/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PySpark 4.x needs a JDK; mirrors the local dev setup (Temurin 21).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: "Install (package + test extras: pyspark, pytest, chispa)"
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]" build

      - name: Smoke import
        run: python -c "import ssv_data, ssv_data.runtime.pipeline; print('ssv_data', ssv_data.__version__ if hasattr(ssv_data,'__version__') else 'ok')"

      # Unit + local-Spark e2e (functional-core transforms run without any external source).
      - name: Run tests
        run: PYTHONPATH=. python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssv_data-wheel
          path: dist/*.whl
          if-no-files-found: error